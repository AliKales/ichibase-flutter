name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The package itself is pure Dart (no Flutter dep). Resolve + analyze + test
  # it under plain Dart. The `example/` is a separate Flutter app — `dart pub
  # get` at the root would try to resolve it and fail (it needs the Flutter
  # SDK), so remove it first; this also proves the package stays Flutter-free.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: rm -rf example
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  # The example is a Flutter app — analyze it with the Flutter toolchain.
  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: example
      - run: flutter analyze
        working-directory: example
