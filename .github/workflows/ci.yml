name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The package depends on the Flutter SDK (pubspec: flutter from sdk), so
  # resolve + analyze + test it under Flutter. (`dart pub get` here fails:
  # "depends on flutter from sdk".) The `example/` is a separate package with
  # its own pubspec and isn't part of the root resolution.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # The example is a Flutter app — analyze it with the Flutter toolchain.
  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: example
      - run: flutter analyze
        working-directory: example
